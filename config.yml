version: 2.1

jobs:
  test:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout

      - run:
          name: Install Newman
          command: npm install -g newman

      - run:
          name: Run API Tests
          command: newman run tests/AmpolTest.postman_collection.json

workflows:
  version: 2
  test-workflow:
    jobs:
      - test
